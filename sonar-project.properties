# Configuración de exclusiones para SonarCloud
# Ignoramos todas las librerías de terceros legacy (TCPDF, PHPQRCode, FPDI, FPDF)
# para evitar falsos positivos de código inaccesible, referencias no destruidas, etc.

sonar.exclusions=digital/libs/tcpdf/**, digital/libs/phpqrcode/**, digital/libs/fpdi/**, pdf/fpdf.php, pdf/makefont/**, config/db_config.php, config/db_config.example.php


